<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Simon</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
</head>

<body>
  <h1 id="level-title">Press A Key to Start</h1>
  <div class="container">
    <div class="row">

      <div type="button" id="green" class="btn green large-txt">
        Q
      </div>

      <div type="button" id="red" class="btn red large-txt">
        W
      </div>
    </div>

    <div class="row">

      <div type="button" id="yellow" class="btn yellow large-txt">
        A
      </div>
      <div type="button" id="blue" class="btn blue large-txt">
        S
      </div>

    </div>

  </div>

  <div class="instructions">
    <a href="instruction.html">Instructions</a>
    <button id="restart-btn">Restart</button>
  </div>


</body>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script> 
    <script src="index.js"></script>

</html>
